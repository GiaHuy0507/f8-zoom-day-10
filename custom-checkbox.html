<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkbox Custom</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/custom-checkbox.css" />
  </head>
  <body>
    <form action="">
      <div class="control">
        <div class="control-items">
          <span>Checkbox</span>
          <label for="checkbox" class="checkbox">
            <input type="checkbox" name="" id="checkbox" hidden />
          </label>
        </div>
        <div class="control-items">
          <span>Radio</span>
          <label for="radio" class="radio">
            <input type="radio" name="" id="radio" hidden />
          </label>
        </div>

        <div class="control-items">
          <span>Switch</span>
          <label for="switch" class="switch">
            <input type="checkbox" name="" id="switch" hidden />
          </label>
        </div>
      </div>
    </form>
  </body>
</html>
